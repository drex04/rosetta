<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1117"/>
      <stop offset="100%" stop-color="#161b27"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent bar top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Decorative node grid (subtle canvas feel) -->
  <!-- Source node (amber) -->
  <rect x="80" y="180" width="160" height="52" rx="6" fill="#f59e0b" fill-opacity="0.12" stroke="#f59e0b" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="160" y="211" font-family="ui-monospace, monospace" font-size="13" fill="#f59e0b" text-anchor="middle">RadarTrack</text>

  <!-- Master ontology node (blue) -->
  <rect x="80" y="270" width="160" height="52" rx="6" fill="#3b82f6" fill-opacity="0.12" stroke="#3b82f6" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="160" y="301" font-family="ui-monospace, monospace" font-size="13" fill="#3b82f6" text-anchor="middle">Track</text>

  <!-- Mapping dashed edge -->
  <line x1="240" y1="206" x2="320" y2="296" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,4" stroke-opacity="0.6"/>
  <circle cx="320" cy="296" r="3" fill="#22c55e" fill-opacity="0.8"/>

  <!-- Second source node -->
  <rect x="80" y="360" width="160" height="52" rx="6" fill="#f59e0b" fill-opacity="0.12" stroke="#f59e0b" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="160" y="391" font-family="ui-monospace, monospace" font-size="13" fill="#f59e0b" text-anchor="middle">SensorContact</text>
  <line x1="240" y1="386" x2="320" y2="322" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,4" stroke-opacity="0.6"/>

  <!-- Main heading -->
  <text x="440" y="230" font-family="ui-sans-serif, system-ui, sans-serif" font-size="72" font-weight="700" fill="#f8fafc" letter-spacing="-2">Rosetta</text>

  <!-- Tagline -->
  <text x="440" y="285" font-family="ui-sans-serif, system-ui, sans-serif" font-size="26" fill="#94a3b8" letter-spacing="-0.3">Visual Ontology Mapper</text>

  <!-- Feature pills -->
  <rect x="440" y="320" width="90" height="28" rx="14" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-opacity="0.5" stroke-width="1"/>
  <text x="485" y="339" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#f59e0b" text-anchor="middle">OWL / RDF</text>

  <rect x="542" y="320" width="80" height="28" rx="14" fill="#22c55e" fill-opacity="0.15" stroke="#22c55e" stroke-opacity="0.5" stroke-width="1"/>
  <text x="582" y="339" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#22c55e" text-anchor="middle">SHACL</text>

  <rect x="634" y="320" width="66" height="28" rx="14" fill="#a855f7" fill-opacity="0.15" stroke="#a855f7" stroke-opacity="0.5" stroke-width="1"/>
  <text x="667" y="339" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#a855f7" text-anchor="middle">RML</text>

  <!-- Sub-description -->
  <text x="440" y="395" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18" fill="#64748b">Build, map, validate, and fuse ontologies</text>
  <text x="440" y="420" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18" fill="#64748b">entirely in the browser. No backend required.</text>

  <!-- URL badge -->
  <rect x="440" y="460" width="340" height="36" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="610" y="484" font-family="ui-monospace, monospace" font-size="15" fill="#94a3b8" text-anchor="middle">rosetta.drewnollsch.com</text>
</svg>
