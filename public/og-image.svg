<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <filter id="shadow-sm" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Light canvas background -->
  <rect width="1200" height="630" fill="#f1f5f9"/>

  <!-- Dark navy header bar -->
  <rect x="0" y="0" width="1200" height="52" fill="#0f172a"/>

  <!-- Header: app name -->
  <text x="20" y="34" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="600" fill="#f8fafc" letter-spacing="-0.3">Rosetta Workbench</text>

  <!-- Header: tab bar (right side) -->
  <text x="820" y="34" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#64748b">LOAD</text>
  <text x="870" y="34" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#64748b">BUILD</text>
  <!-- MAP tab active -->
  <rect x="920" y="38" width="34" height="2" rx="1" fill="#3b82f6"/>
  <text x="922" y="34" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#f8fafc">MAP</text>
  <text x="966" y="34" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#64748b">FUSE</text>
  <text x="1010" y="34" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#64748b">CHECK</text>

  <!-- ═══════════════════════════════════════ -->
  <!-- CANVAS AREA (left 52%) -->
  <!-- ═══════════════════════════════════════ -->

  <!-- Subtle grid dots on canvas -->
  <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="12" cy="12" r="1" fill="#cbd5e1" fill-opacity="0.5"/>
  </pattern>
  <rect x="0" y="52" width="620" height="578" fill="url(#dots)"/>

  <!-- ── Source node 1: RadarTrack (amber) ── -->
  <g filter="url(#shadow)">
    <rect x="48" y="110" width="196" height="148" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <!-- amber header -->
    <rect x="48" y="110" width="196" height="30" rx="8" fill="#f59e0b"/>
    <rect x="48" y="126" width="196" height="14" fill="#f59e0b"/>
    <text x="60" y="130" font-family="ui-monospace, monospace" font-size="11" font-weight="600" fill="white">RadarTrack</text>
    <!-- fields -->
    <line x1="48" y1="140" x2="244" y2="140" stroke="#f3f4f6" stroke-width="1"/>
    <!-- field 1 -->
    <circle cx="60" cy="157" r="4" fill="#f59e0b" fill-opacity="0.3" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="72" y="161" font-family="ui-monospace, monospace" font-size="10" fill="#374151">ziel_id</text>
    <text x="190" y="161" font-family="ui-monospace, monospace" font-size="9" fill="#94a3b8" text-anchor="end">xsd:string</text>
    <!-- field 2 -->
    <circle cx="60" cy="179" r="4" fill="#f59e0b" fill-opacity="0.3" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="72" y="183" font-family="ui-monospace, monospace" font-size="10" fill="#374151">kurs_grad</text>
    <text x="190" y="183" font-family="ui-monospace, monospace" font-size="9" fill="#94a3b8" text-anchor="end">xsd:integer</text>
    <!-- field 3 -->
    <circle cx="60" cy="201" r="4" fill="#f59e0b" fill-opacity="0.3" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="72" y="205" font-family="ui-monospace, monospace" font-size="10" fill="#374151">radar</text>
    <text x="190" y="205" font-family="ui-monospace, monospace" font-size="9" fill="#94a3b8" text-anchor="end">xsd:string</text>
    <!-- field 4 -->
    <circle cx="60" cy="223" r="4" fill="#f59e0b" fill-opacity="0.3" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="72" y="227" font-family="ui-monospace, monospace" font-size="10" fill="#374151">zeitstempel</text>
    <text x="190" y="227" font-family="ui-monospace, monospace" font-size="9" fill="#94a3b8" text-anchor="end">xsd:string</text>
    <!-- right connector dot -->
    <circle cx="244" cy="157" r="4" fill="#f59e0b"/>
    <circle cx="244" cy="201" r="4" fill="#f59e0b"/>
  </g>

  <!-- ── Source node 2: Position (amber) ── -->
  <g filter="url(#shadow)">
    <rect x="48" y="360" width="196" height="126" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="48" y="360" width="196" height="30" rx="8" fill="#f59e0b"/>
    <rect x="48" y="376" width="196" height="14" fill="#f59e0b"/>
    <text x="60" y="380" font-family="ui-monospace, monospace" font-size="11" font-weight="600" fill="white">Position</text>
    <line x1="48" y1="390" x2="244" y2="390" stroke="#f3f4f6" stroke-width="1"/>
    <circle cx="60" cy="407" r="4" fill="#f59e0b" fill-opacity="0.3" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="72" y="411" font-family="ui-monospace, monospace" font-size="10" fill="#374151">breite</text>
    <text x="190" y="411" font-family="ui-monospace, monospace" font-size="9" fill="#94a3b8" text-anchor="end">xsd:float</text>
    <circle cx="60" cy="429" r="4" fill="#f59e0b" fill-opacity="0.3" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="72" y="433" font-family="ui-monospace, monospace" font-size="10" fill="#374151">laenge</text>
    <text x="190" y="433" font-family="ui-monospace, monospace" font-size="9" fill="#94a3b8" text-anchor="end">xsd:float</text>
    <circle cx="60" cy="451" r="4" fill="#f59e0b" fill-opacity="0.3" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="72" y="455" font-family="ui-monospace, monospace" font-size="10" fill="#374151">hoehe_m</text>
    <text x="190" y="455" font-family="ui-monospace, monospace" font-size="9" fill="#94a3b8" text-anchor="end">xsd:integer</text>
    <circle cx="244" cy="407" r="4" fill="#f59e0b"/>
    <circle cx="244" cy="429" r="4" fill="#f59e0b"/>
  </g>

  <!-- ── Ontology node 1: Track (blue) ── -->
  <g filter="url(#shadow)">
    <rect x="360" y="148" width="210" height="148" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="360" y="148" width="210" height="30" rx="8" fill="#3b82f6"/>
    <rect x="360" y="164" width="210" height="14" fill="#3b82f6"/>
    <text x="372" y="168" font-family="ui-monospace, monospace" font-size="11" font-weight="600" fill="white">ontology:Track</text>
    <line x1="360" y1="178" x2="570" y2="178" stroke="#f3f4f6" stroke-width="1"/>
    <text x="374" y="200" font-family="ui-monospace, monospace" font-size="10" fill="#374151">Track Number</text>
    <text x="556" y="200" font-family="ui-monospace, monospace" font-size="9" fill="#94a3b8" text-anchor="end">xsd:string</text>
    <circle cx="360" cy="196" r="4" fill="#3b82f6"/>
    <text x="374" y="222" font-family="ui-monospace, monospace" font-size="10" fill="#374151">Timestamp</text>
    <text x="556" y="222" font-family="ui-monospace, monospace" font-size="9" fill="#94a3b8" text-anchor="end">xsd:dateTime</text>
    <circle cx="360" cy="218" r="4" fill="#3b82f6"/>
    <text x="374" y="244" font-family="ui-monospace, monospace" font-size="10" fill="#374151">Country Code</text>
    <text x="556" y="244" font-family="ui-monospace, monospace" font-size="9" fill="#94a3b8" text-anchor="end">xsd:string</text>
    <circle cx="360" cy="240" r="4" fill="#3b82f6"/>
    <text x="374" y="266" font-family="ui-monospace, monospace" font-size="10" fill="#374151">Track Quality</text>
    <text x="556" y="266" font-family="ui-monospace, monospace" font-size="9" fill="#94a3b8" text-anchor="end">xsd:float</text>
    <circle cx="360" cy="262" r="4" fill="#3b82f6"/>
  </g>

  <!-- ── Ontology node 2: Air Track (blue) ── -->
  <g filter="url(#shadow)">
    <rect x="360" y="388" width="210" height="126" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="360" y="388" width="210" height="30" rx="8" fill="#3b82f6"/>
    <rect x="360" y="404" width="210" height="14" fill="#3b82f6"/>
    <text x="372" y="408" font-family="ui-monospace, monospace" font-size="11" font-weight="600" fill="white">ontology:AirTrack</text>
    <line x1="360" y1="418" x2="570" y2="418" stroke="#f3f4f6" stroke-width="1"/>
    <text x="374" y="440" font-family="ui-monospace, monospace" font-size="10" fill="#374151">Latitude</text>
    <text x="556" y="440" font-family="ui-monospace, monospace" font-size="9" fill="#94a3b8" text-anchor="end">xsd:float</text>
    <circle cx="360" cy="436" r="4" fill="#3b82f6"/>
    <text x="374" y="462" font-family="ui-monospace, monospace" font-size="10" fill="#374151">Longitude</text>
    <text x="556" y="462" font-family="ui-monospace, monospace" font-size="9" fill="#94a3b8" text-anchor="end">xsd:float</text>
    <circle cx="360" cy="458" r="4" fill="#3b82f6"/>
    <text x="374" y="484" font-family="ui-monospace, monospace" font-size="10" fill="#374151">Altitude (ft)</text>
    <text x="556" y="484" font-family="ui-monospace, monospace" font-size="9" fill="#94a3b8" text-anchor="end">xsd:float</text>
    <circle cx="360" cy="480" r="4" fill="#3b82f6"/>
  </g>

  <!-- ── Mapping edges (green dashed) ── -->
  <!-- RadarTrack.ziel_id → Track.Track Number -->
  <line x1="248" y1="157" x2="356" y2="196" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="285" y="168" font-family="ui-sans-serif, system-ui, sans-serif" font-size="9" fill="#16a34a" text-anchor="middle">direct</text>

  <!-- RadarTrack.radar → Track.Country Code -->
  <line x1="248" y1="201" x2="356" y2="240" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="292" y="214" font-family="ui-sans-serif, system-ui, sans-serif" font-size="9" fill="#16a34a" text-anchor="middle">direct</text>

  <!-- Position.breite → Air Track.Latitude -->
  <line x1="248" y1="407" x2="356" y2="436" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="295" y="415" font-family="ui-sans-serif, system-ui, sans-serif" font-size="9" fill="#16a34a" text-anchor="middle">typecast</text>

  <!-- Position.laenge → Air Track.Longitude -->
  <line x1="248" y1="429" x2="356" y2="458" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- ═══════════════════════════════════════ -->
  <!-- DIVIDER + RIGHT TEXT AREA -->
  <!-- ═══════════════════════════════════════ -->

  <!-- Subtle vertical divider -->
  <line x1="640" y1="72" x2="640" y2="610" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Right side white background -->
  <rect x="640" y="52" width="560" height="578" fill="white" fill-opacity="0.6"/>

  <!-- App name -->
  <text x="672" y="155" font-family="ui-sans-serif, system-ui, sans-serif" font-size="68" font-weight="700" fill="#0f172a" letter-spacing="-2">Rosetta</text>

  <!-- Tagline -->
  <text x="672" y="198" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" fill="#475569" letter-spacing="-0.2">Visual Ontology Mapper</text>

  <!-- Divider line under tagline -->
  <line x1="672" y1="218" x2="1150" y2="218" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Feature pills row 1 -->
  <rect x="672" y="234" width="88" height="26" rx="13" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="716" y="251" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500" fill="#92400e" text-anchor="middle">OWL / RDF</text>

  <rect x="770" y="234" width="72" height="26" rx="13" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="806" y="251" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500" fill="#166534" text-anchor="middle">SHACL</text>

  <rect x="852" y="234" width="56" height="26" rx="13" fill="#ede9fe" stroke="#a855f7" stroke-width="1"/>
  <text x="880" y="251" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500" fill="#6b21a8" text-anchor="middle">RML</text>

  <rect x="918" y="234" width="86" height="26" rx="13" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="961" y="251" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500" fill="#1e40af" text-anchor="middle">SPARQL</text>

  <!-- Description lines -->
  <text x="672" y="308" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" fill="#374151">Visually design data integration pipelines</text>
  <text x="672" y="332" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" fill="#374151">for coalition operations. Map heterogeneous</text>
  <text x="672" y="356" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" fill="#374151">JSON/XML schemas to a common OWL ontology,</text>
  <text x="672" y="380" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" fill="#374151">validate with SHACL, export RML.</text>

  <!-- "No backend required" badge -->
  <rect x="672" y="404" width="192" height="28" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="768" y="423" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="500" fill="#15803d" text-anchor="middle">✓ Runs entirely in the browser</text>

  <!-- URL badge at bottom -->
  <rect x="672" y="530" width="292" height="38" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="818" y="554" font-family="ui-monospace, monospace" font-size="14" fill="#475569" text-anchor="middle">rosetta.drewnollsch.com</text>
</svg>
